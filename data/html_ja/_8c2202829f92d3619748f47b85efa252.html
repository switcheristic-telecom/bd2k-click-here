 &lt;p&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/aiken/index.html target=home&gt;わんとおしゃべり掲示板&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;相談、 初めまして、おしゃべりにご利用ください。&lt;br&gt;
 &lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;みんなで考えようしつけ相談&lt;/font&gt;！&lt;font size=2&gt; 
 &lt;/font&gt;&lt;font size=2&gt;&lt;a href=https://web.archive.org/web/20020802161054/http://www.wan.ne.jp/cgi/situke/cbbs.cgi&gt;&lt;br&gt;
 しつけ相談室&lt;/a&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/any/any2.htm&gt;&lt;/a&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/any/any2.htm&gt;&lt;/a&gt; 　&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/cgi/situke_h/258/index.html&gt;しつけ相談ＦＡＱ&lt;/a&gt; 
 &lt;br&gt;
 &lt;/font&gt;&lt;font size=2&gt; &lt;/font&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/petsitter/index.htm&gt;ペットシッター&lt;font size=2&gt;相談箱&lt;/font&gt;&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;旅行に行きたい、いつも夜が遅いから散歩ができない、ペットシッターってなに？。なんでも相談ください。&lt;/font&gt; 
 &lt;br&gt;
 &lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/requiem/index.html&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 border=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;犬達の&lt;/a&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/requiem/index.html&gt;レクイエム&lt;/a&gt;&lt;b&gt;&lt;/b&gt;&lt;br&gt;
 &lt;font size=2&gt;彼らの命を守るために、 私たちにできることがあります 。一緒に考えていきませんか。&lt;/font&gt;&lt;br&gt;
 &lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/cgi/wan-hiroba2/minibbs.html&gt;わんの広場&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;イベントの等のお知らせなどにご利用ください。&lt;br&gt;

 わんと一緒にお茶を飲みながら楽しいおしゃべりが出来ます。初めての方大歓迎。&lt;br&gt;
 お茶とおいしいケーキ食べていってください！！ &lt;br&gt;
 &lt;/font&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=11 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/cgi/kea/index.html&gt;トリミング相談室&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;ロンドンにお住まいのトリマーハラさんのトリミング相談室。トリミングや手入れについて答えてもらいます。&lt;br&gt;
 &lt;/font&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=11 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/konoinu/konoinu.htm&gt;この犬一番フォーラム&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;「この犬一番」の著者、富澤先生のフォーラムです。&lt;/font&gt;&lt;br&gt;
 &lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054/http://www.wan.ne.jp/cgi_robot/&gt;ラブボット&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;インターネットに住んでいるゴールデンのラブちゃんと楽しいお話をしてください&lt;/font&gt;&lt;/p&gt;
 &lt;p&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;5&quot; height=&quot;5&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=250 height=2 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-6)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;/p&gt;

 &lt;div align=left&gt; 
 &lt;p&gt;&lt;font size=2&gt; &lt;/font&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/outdoor/index.html&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 border=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;/a&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/aroma/index.html&gt;わんとアロマテラピー 
 &lt;/a&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/any/any2.htm&gt;&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt;ペットのいる暮らし、香りのある生活、みんなで考えていきませんか。&lt;br&gt;
 &lt;/font&gt;&lt;a href=https://web.archive.org/web/20020802161054/http://www.wan.ne.jp/motomura/&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 border=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;わんと食事&lt;/a&gt;&lt;br&gt;
 食事関する相談コーナー &lt;br&gt;
 &lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/byoin/kariya/kariya.html&gt;健康相談室&lt;/a&gt;&lt;br&gt;
 わんの健康相談について苅谷動物病院の獣医師さんがお答えします。&lt;br&gt;
 &lt;font color=%23FF0000&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/show/show.htm&gt;ドッグショー相談コーナー&lt;/a&gt;&lt;br&gt;
 &lt;/font&gt;&lt;font size=2&gt;ドッグショーってなに？&lt;/font&gt;、&lt;font size=2&gt;見学に行きたい方、自分ちの「わん」チャレンジしてみようかしら。そんな質問まっています。&lt;br&gt;
 &lt;/font&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054/http://www.wan.ne.jp/cgi/chat/chatbbs.htm&gt;わんちゃっと&lt;/a&gt;きてね！&lt;br&gt;
 &lt;font size=2&gt;わんのお友達と待ち合わせ掲示板とチャットができます&lt;br&gt;
 &lt;/font&gt;&lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/diy/index.html&gt;&lt;font color=%23FF0000&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 border=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;/font&gt;わんと&lt;/a&gt; 
 &lt;a href=https://web.archive.org/web/20020802161054fw_/http://wan.ne.jp/diy/index.html&gt;ＤＩＹ&lt;/a&gt; &lt;br&gt;
 &lt;font size=2&gt;わんのホームページを作りたい、犬小屋を作りたい、わんのパッチワークを作りたい、なんでも作りたい、みんなの意見交換の場です。 
 &lt;br&gt;
 &lt;/font&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;5&quot; height=&quot;5&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=250 height=2 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-6)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;img src='data:image/svg+xml,&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;10&quot; height=&quot;10&quot;&gt;&lt;rect fill-opacity=&quot;0&quot;/&gt;&lt;/svg&gt;' width=10 height=10 naturalsizeflag=0 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-8)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;&gt;&lt;a href=https://web.archive.org/web/20020802161054/http://shop.wan.ne.jp/cgi/free/minibbs.cgi&gt;フリーマッケット&lt;/a&gt;&lt;br&gt;
 &lt;font size=2&gt; 売ります、買いますのコーナーです。入らなくなった用品などありましたら出してみては。 &lt;br&gt;
 &lt;/font&gt;&lt;/p&gt;
