<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click here / Clic aquí / クリック / 点击</title>
    <script src="./lib/qrcode.min.js"></script>
    <style>
      @keyframes blink {
        0%,
        100% {
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
      }
      @font-face {
        font-family: 'Ark Pixel 10px Monospaced';
        src: url('fonts/ark-pixel-10px-monospaced-latin.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-ja.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-ko.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_cn.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_hk.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_tr.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_tw.woff2') format('woff2');
      }
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #1c54f5;
        font-family: 'Ark Pixel 10px Monospaced', Arial, sans-serif;
      }
      .container {
        position: relative;
        display: inline-block;
      }
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      .ocr-result {
        position: absolute;
        padding: 5px;
        font-size: 14px;
        transform: translate(-50%, -50%);
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.5s ease;
        /* background-color: rgba(244, 244, 0, 0.2); */
        /* background-color: #1c54f5; */
        border: #ff0000;
        border-width: 10px;
        border-style: solid;
      }

      .ocr-result:hover {
        opacity: 0;
      }

      #ocrResultClickTarget {
        background-color: #1c54f5;
        z-index: 10;
        padding: 16px;
        padding-left: 48px;
        padding-right: 48px;
      }

      #language-selector-nav {
        position: absolute;
        top: 0;
        left: 0;
        padding: 10px;
        color: white;
        display: flex;
        flex-direction: row;
        gap: 10px;
        font-size: 2rem;
      }
      .language-button {
        cursor: pointer;
      }

      .language-button:hover {
        text-decoration: underline;
      }
      .language-button.active {
        text-decoration: underline;
        cursor: default;
      }

      .bottom-right {
        position: absolute;
        bottom: 0;
        right: 0;
        padding: 10px;
        color: white;
      }
      #qrcode {
        opacity: 0.5;
      }
      .no-select {
        -webkit-user-select: none; /* Chrome, Safari, and Opera */
        -moz-user-select: none; /* Firefox */
        -ms-user-select: none; /* Internet Explorer/Edge */
        user-select: none; /* Non-prefixed version, currently supported by Chrome, Edge, Opera and Firefox */
      }
    </style>
  </head>
  <body>
    <div class="container" id="imageContainer">
      <img id="bannerImage" src="" alt="Banner Image" class="no-select" />
      <div id="ocrResult" class="ocr-result no-select"></div>
      <div id="ocrResultClickTarget" class="ocr-result no-select"></div>
    </div>
    <div id="language-selector-nav" class="no-select">
      <div class="language-button" id="en-button">Click here</div>
      <span> / </span>
      <!-- <div class="language-button" id="es-button">ES</div> -->
      <div class="language-button" id="es-button">Clic aquí</div>
      <span> / </span>
      <!-- <div class="language-button" id="ja-button">JA</div> -->
      <div class="language-button" id="ja-button">クリック</div>
      <span> / </span>
      <div class="language-button" id="zh-button">点击</div>
    </div>

    <!-- <div id="yinliu" class="bottom-right">
      <div id="qrcode"></div>
    </div> -->

    <script src="./banner-page.js"></script>
  </body>
</html>
