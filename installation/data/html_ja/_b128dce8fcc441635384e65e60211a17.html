&lt;h3&gt;NEC、現代電子に高速メモリー技術供与&lt;/h3&gt;
&lt;p&gt;　ＮＥＣは25日、韓国大手半導体メーカーの現代電子産業と高性能メモリー分野で提携すると発表した。ＮＥＣが独自開発したパソコン向けの高速ＤＲＡＭ（記憶保持動作が必要な随時書き込み読み出しメモリー）の技術を供与、現代電子が生産・販売する。ＮＥＣはメモリー分野で韓国大手を巻き込むことで、独自メモリーの世界的な普及を狙っている。日韓はライバル関係にあるが、リスクの大きい次世代品では、今後同様の提携関係が増えるものと見られる。&lt;/p&gt;&lt;/td&gt;
