<h2><b><font color=maroon>NEWEST SITES JUST ADDED:</font></b></h2>
<ul><font size=+1>
<li><img height=16 src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;45&quot; height=&quot;16&quot;><rect fill-opacity=&quot;0&quot;/></svg>' width=45 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-4)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;>(08-16-00) - <a href=https://web.archive.org/web/20000816192529/http://www.festspiele.de/><b>The Richard Wagner Festival Site</b></a> Great resource for Wagner and The Bayreuth Festival. Leads to Wagner links all over the web. Main site available in English or German language. (In Composers, Conductors, Performers category)<p>
 
</p><li><img height=16 src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;45&quot; height=&quot;16&quot;><rect fill-opacity=&quot;0&quot;/></svg>' width=45 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-4)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;>(08-11-00) - <a href=https://web.archive.org/web/20000816192529/http://www.klassiekemuziekradios.com/> <b>klassieke muziekstations live op het internet</b></a> - This fantastic site for live online radio, and some reference information, is from Wim Wylin of Belgium. The top level is in German, but most of the linked resources are in English. The layout is so good, it is easy to find your way around, and leads to worldwide radio stations. &quot;...hyperlinks to almost 400 radiostations, broadcastservers, bicasters etc. playing classical music live on the internet (the most complete for this music format from the whole web!).&quot;<p>
</p><li><img height=16 src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;45&quot; height=&quot;16&quot;><rect fill-opacity=&quot;0&quot;/></svg>' width=45 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-4)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;>(08-11-00) - <a href=https://web.archive.org/web/20000816192529/http://www.lib.duke.edu/music/resources/classical_index.html><b>DUKE UNIVERSITY'S &quot;DW3&quot; - CLASSICAL MUSIC RESOURCES</b></a> Superb scholarly music resources from Duke University, Durham, North Carolina. &quot;...the most comprehensive collection of classical music resources on the Web with links to nearly 2,000 non-commercial pages/sites in over a dozen languages.&quot;
<p>
</p><li><img height=16 src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;45&quot; height=&quot;16&quot;><rect fill-opacity=&quot;0&quot;/></svg>' width=45 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-4)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;>(08-09-00) - <a href=https://web.archive.org/web/20000816192529/http://4jazz.4anything.com/><b> 4JAZZ </b></a> at <a href=https://web.archive.org/web/20000816192529/http://www.4anything.com/home> <b>4ANYTHING.COM</b></a> leads to some great jazz sites. 4ANYTHING is a big web directory with a lot of interesting topics. (Goes in Jazz in &quot;Other Music Styles.&quot; Also in &quot;Music and Internet Megasites.&quot;)<p>
</p></li></font><li><font size=+1><img height=16 src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;45&quot; height=&quot;16&quot;><rect fill-opacity=&quot;0&quot;/></svg>' width=45 style=&quot;background-blend-mode:normal!important;background-clip:content-box!important;background-position:50%25 50%25!important;background-color:rgba(0,0,0,0)!important;background-image:var(--sf-img-4)!important;background-size:100%25 100%25!important;background-origin:content-box!important;background-repeat:no-repeat!important&quot;>(08-07-00) - I just added <a href=https://web.archive.org/web/20000816192529/http://w1.xrefer.com/search.jsp><b>XREFER</b></a>, a great new scholarly search engine to all my pages. XREFER contains encyclopedias, dictionaries, thesauri, books of quotations and reference works on many subjects. Included are books like the Penguin Encyclopedia of Places, the Grove Concise Dictionary of Music, the Oxford Dictionary of Art. Good for looking up historical musicians and composers, other historical information, literary information, and practically anything of an academic nature. (It's a British site, so sometimes a search brings up more British information than anything else.) Give it a try and let me know what you think of it!</font><p><font size=+1></font></p></ul>

<h3><font color=teal>Reviews:</font></h3><p>
&quot;If you’re not quite sure what you’re looking for, try [Classical USA:] Classical Music on the Web . It’s a giant collection of links, divided into categories such as reference sites and CD resources and classical newsgroups. It’s a great place to start your browsing.&quot; <br></p><center> - from &quot;Symphony in URL Minor&quot; by Brian Kennedy for <a href=&quot;https://web.archive.org/web/20000816192529/http://www.netguide.com/Snapshot/Archive?guide=entertainment&amp;amp;id=642&quot; target=_New><font size=+1><b>NETGUIDE</b></font></a> </center>
<p><br><p>
&quot;The award for the best annotations goes to Paul Baker, who runs the Classical USA site... each [link] has a personal annotation which indicates that a lot of care has gone into the selection. Although nominally a US site the global coverage is good.&quot; <br></p><center> - from &quot;Classical Music Web Sites&quot; by Martin White for <a href=https://web.archive.org/web/20000816192529/http://www.freepint.co.uk/issues/030200.htm target=_New><font size=+1><b>Free Pint</b></font></a><br>(3rd February 2000, No.55)</center>
