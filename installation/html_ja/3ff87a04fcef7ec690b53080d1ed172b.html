　このページの作者は前田憲男といいます。　かの有名な「前田憲男」様とは異なりピアノも弾けないまがい物です。<br><br>
　５年ほど前まで、音響機器の設計に従事していた、ハードウェア・サイドのエンジニアです。<br><br>
　現在は音響とは無縁の生活をしておりますが、小学校から就職に至るまで、約20年間にわたりオーディオにとりつかれ、こつこつと溜めた知識をゴミ箱に放り込んだままというのも不甲斐なく、このホームページを作ることにいたしました。<br><br>
　元来、ハードウェア・サイドのエンジニアですので、本来であればオペアンプがどうの、どこのDSPチップがどうのといったディープな部分が専門ではありますが、それらの知識は専門書をひもとき、バラしていけば理解されることでありますので、このページではあまり深入りせず、プロフェッショナルオーディオ的視点から見た技術に絞って記述していく予定です。<br><br>
　メーカーのサイトではありませんので、このページの運営に当たっては、ごらんいただいた方からのアドバイスを取り入れ、充実させてゆきたいと考えておりますので、みなさまのご意見を賜ることができれば、ありがたく思います。<br><br>
