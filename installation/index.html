<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click here / Clic aquí / クリック / 点击</title>
    <style>
      /* fonts/ark-pixel-10px-monospaced-ja.woff2 fonts/ark-pixel-10px-monospaced-ko.woff2 fonts/ark-pixel-10px-monospaced-latin.woff2 fonts/ark-pixel-10px-monospaced-zh_cn.woff2 fonts/ark-pixel-10px-monospaced-zh_hk.woff2 fonts/ark-pixel-10px-monospaced-zh_tr.woff2 fonts/ark-pixel-10px-monospaced-zh_tw.woff2 */
      @font-face {
        font-family: 'Ark Pixel 10px Monospaced';
        src: url('fonts/ark-pixel-10px-monospaced-latin.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-ja.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-ko.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_cn.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_hk.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_tr.woff2') format('woff2'),
          url('fonts/ark-pixel-10px-monospaced-zh_tw.woff2') format('woff2');
      }
      @font-face {
        font-family: 'TerminusTTF';
        src: url('/fonts/TerminusTTF-4.49.3.ttf');
      }
      @font-face {
        font-family: 'WenQuanYi Bitmap Song';
        src: url('./fonts//WenQuanYi.Bitmap.Song.16px.ttf');
      }
      @font-face {
        font-family: 'MS Sans Serif 1';
        src: url('./fonts/ms-sans-serif-1.ttf');
      }
      body {
        margin: 0;
        padding: 20px;
        height: 100vh;
        background-color: #008080;
        font-family: 'WenQuanYi Bitmap Song', Arial, sans-serif;
        overflow: hidden;
      }
      .window {
        position: absolute;
        width: 640px;
        height: 480px;
        background-color: #c0c0c0;
        border: 2px solid #dfdfdf;
        border-right-color: #808080;
        border-bottom-color: #808080;
        box-shadow: 2px 2px 0 #000000;
      }
      .title-bar {
        background-color: #000080;
        color: white;
        padding: 2px 4px;
        font-weight: bold;
        font-size: 14px;
        cursor: move;
        user-select: none;
      }
      .content {
        position: absolute;
        top: 22px;
        left: 2px;
        right: 2px;
        bottom: 2px;
        background-color: #fff;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .resizer {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 15px;
        height: 15px;
        background-color: #c0c0c0;
        cursor: se-resize;
      }
      .resizer::before,
      .resizer::after {
        content: '';
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 5px;
        height: 5px;
        background-color: #000;
      }
      .resizer::before {
        bottom: 8px;
        right: 8px;
      }
      .window {
        will-change: transform;
        contain: layout style;
      }
      .window.dragging {
        box-shadow: none;
      }
      @media (max-width: 768px) {
        body {
          padding: 0;
          display: flex;
          flex-direction: column;
          height: 100vh;
          overflow: hidden;
        }
        .window {
          position: static !important;
          width: 100% !important;
          height: 50% !important;
          transform: none !important;
          box-shadow: none;
          border: none;
          border-bottom: 2px solid #808080;
        }
        .title-bar {
          cursor: default;
        }
        .resizer {
          display: none;
        }
        .content {
          overflow: hidden;
        }
        .content iframe {
          width: 200%;
          height: 200%;
          transform: scale(0.5);
          transform-origin: 0 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="window" id="window1" style="top: 50px; left: 50px">
      <div class="title-bar">Click here / Clic aquí / クリック / 点击</div>
      <div class="content">
        <iframe src="./banner-page.html"></iframe>
      </div>
      <div class="resizer"></div>
    </div>
    <div class="window" id="window2" style="top: 100px; left: calc(100vw - 690px)">
      <div class="title-bar">Source Webpage</div>
      <div class="content">
        <iframe src="snapshot-page.html"></iframe>
      </div>
      <div class="resizer"></div>
    </div>

    <script>
      const allIframes = document.querySelectorAll('iframe');
      document.querySelectorAll('.window').forEach(makeWindowInteractive);

      function disableIframePointerEvents() {
        allIframes.forEach(f => f.style.pointerEvents = 'none');
      }
      function enableIframePointerEvents() {
        allIframes.forEach(f => f.style.pointerEvents = '');
      }

      function makeWindowInteractive(win) {
        const titleBar = win.querySelector('.title-bar');
        const resizer = win.querySelector('.resizer');
        let startX, startY, startWidth, startHeight, startLeft, startTop;
        let pendingX, pendingY, rafId;

        titleBar.addEventListener('mousedown', initDrag);
        resizer.addEventListener('mousedown', initResize);

        function initDrag(e) {
          startX = e.clientX;
          startY = e.clientY;
          startLeft = win.offsetLeft;
          startTop = win.offsetTop;
          win.classList.add('dragging');
          disableIframePointerEvents();
          document.addEventListener('mousemove', drag);
          document.addEventListener('mouseup', stopDrag);
        }

        function drag(e) {
          pendingX = e.clientX;
          pendingY = e.clientY;
          if (!rafId) {
            rafId = requestAnimationFrame(() => {
              win.style.transform = 'translate(' + (pendingX - startX) + 'px,' + (pendingY - startY) + 'px)';
              rafId = null;
            });
          }
        }

        function stopDrag() {
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
          // Bake transform into left/top
          win.style.left = startLeft + ((pendingX || startX) - startX) + 'px';
          win.style.top = startTop + ((pendingY || startY) - startY) + 'px';
          win.style.transform = '';
          win.classList.remove('dragging');
          enableIframePointerEvents();
          document.removeEventListener('mousemove', drag);
          document.removeEventListener('mouseup', stopDrag);
        }

        function initResize(e) {
          startX = e.clientX;
          startY = e.clientY;
          const rect = win.getBoundingClientRect();
          startWidth = rect.width;
          startHeight = rect.height;
          win.classList.add('dragging');
          disableIframePointerEvents();
          document.addEventListener('mousemove', resize);
          document.addEventListener('mouseup', stopResize);
        }

        function resize(e) {
          pendingX = e.clientX;
          pendingY = e.clientY;
          if (!rafId) {
            rafId = requestAnimationFrame(() => {
              win.style.width = (startWidth + pendingX - startX) + 'px';
              win.style.height = (startHeight + pendingY - startY) + 'px';
              rafId = null;
            });
          }
        }

        function stopResize() {
          if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
          win.classList.remove('dragging');
          enableIframePointerEvents();
          document.removeEventListener('mousemove', resize);
          document.removeEventListener('mouseup', stopResize);
        }
      }
    </script>
  </body>
</html>
