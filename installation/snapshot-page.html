<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Source Webpage</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #000000;
      }
      #iframeContainer {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.1s ease-in-out;
      }
      iframe {
        width: 100%;
        height: 100%;
        max-width: calc(100vh * 4 / 3);
        max-height: calc(100vw * 3 / 4);
        aspect-ratio: 4 / 3;
        border: none;
        background-color: #ffffff;
      }
      #slideshowContainer {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        /* z-index: -1; */
      }
    </style>
  </head>
  <body>
    <div id="iframeContainer">
      <iframe id="bannerFrame" src="about:blank"></iframe>
    </div>
    <div id="slideshowContainer">
      <video id="slideshowVideo" src="background.mp4" autoplay muted loop></video>
    </div>
    <script src="./snapshot-page.js"></script>
  </body>
</html>
